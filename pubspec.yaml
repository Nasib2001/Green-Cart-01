name: grocery_app
description: A new Flutter application.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=2.18.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  location: ^5.0.3
  cupertino_icons: ^1.0.5
  flutter_svg: ^1.1.6
  flutter_staggered_grid_view: ^0.6.2
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  firebase_database: ^11.3.5
  cloud_firestore: ^5.6.6
  firebase_data_connect: ^0.1.4
  provider: ^6.1.1
  geolocator: ^11.0.0
  permission_handler: ^11.3.0
  shared_preferences: ^2.2.2
  google_maps_flutter: ^2.12.1
  google_maps_flutter_web: 0.5.12
  google_maps_flutter_platform_interface: ^2.3.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  



  flutter_test:
    sdk: flutter
  

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/categories_images/
    - assets/images/grocery_images/
    - assets/images/beverages_images/
    - assets/icons/
    - assets/icons/account_icons/
    - assets/images/bkash_logo.png


  fonts:
    - family: Gilroy
      fonts:
        - asset: assets/fonts/gilroy/Gilroy-Regular.ttf
        - asset: assets/fonts/gilroy/Gilroy-SemiBold.ttf
        - asset: assets/fonts/gilroy/Gilroy-Bold.otf
